name: publish image

# Called by release.yml after a release is cut, so exactly one image is built
# per release. Still runnable manually via the Actions tab.
on:
  workflow_call:
    inputs:
      version:
        description: "The release version (e.g. 1.2.3) for docker tagging"
        required: false
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: "Existing release version to rebuild (e.g. 1.2.3). Checks out its vX.Y.Z tag."
        required: false
        type: string

concurrency:
  # Never cancel a half-finished publish — it may be mid-image-push or mid-Coolify-deploy.
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          # When release.yml calls us, github.sha is the PRE-bump commit — the release
          # commit that bumped package.json lands on main *after* this workflow was queued.
          # Check out the vX.Y.Z tag instead so the image contains the bumped version, not
          # the commit before it. Manual dispatch (no version input) builds the ref's HEAD.
          ref: ${{ inputs.version != '' && format('v{0}', inputs.version) || github.sha }}
          # Only package.json/knexfile/migrations/src get COPYed into the image; no git
          # history needed. Shallow + blobless keeps the fetch minimal.
          fetch-depth: 1
          filter: blob:none

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
          fi
          # Sha of the commit actually checked out (the tag), not the pre-bump trigger sha.
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.value }}
            type=sha

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ steps.version.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Single-user homelab image — SLSA provenance/SBOM attestations are dead weight
          # and add a metadata pass + extra manifest per build. Skip both.
          provenance: false
          sbom: false

      # Coolify has a known bug (issues #5318, #5587) where the deploy API reuses
      # locally-cached images instead of pulling fresh ones. Workaround: set
      # SCRIBA_TAG to the exact version so Docker sees a new tag and must pull it.
      - name: set SCRIBA_TAG on Coolify
        run: |
          body=$(mktemp)
          # Writing env vars needs the token's `write` ability; `deploy` alone is not enough
          # (Coolify returns 403 with the list of missing permissions). Capture the body so
          # that list is visible in the log instead of being sent to /dev/null.
          code=$(curl --silent --show-error --output "$body" --write-out "%{http_code}" \
            -X PATCH \
            "${{ secrets.COOLIFY_URL }}/api/v1/applications/${{ secrets.COOLIFY_APP_UUID }}/envs/bulk" \
            --header "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            --header "CF-Access-Client-Id: ${{ secrets.CF_ACCESS_CLIENT_ID }}" \
            --header "CF-Access-Client-Secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}" \
            --header "Content-Type: application/json" \
            --data '{"data":[{"key":"SCRIBA_TAG","value":"${{ steps.version.outputs.value }}"}]}')
          echo "SCRIBA_TAG update responded HTTP $code"
          case "$code" in
            2*) echo "SCRIBA_TAG=${{ steps.version.outputs.value }} set on Coolify" ;;
            403) echo "::error::Coolify returned 403 Forbidden updating env vars. The COOLIFY_TOKEN needs the 'write' ability (env-var writes require 'write'; 'deploy' alone is insufficient). Regenerate the token with 'write' + 'deploy' (or 'root'). Response body:"; cat "$body"; echo; exit 1 ;;
            *)   echo "::error::SCRIBA_TAG update did not reach Coolify (HTTP $code); check CF Access service token / secrets. Response body:"; cat "$body"; echo; exit 1 ;;
          esac

      # Trigger Coolify only after the image is published and SCRIBA_TAG is set.
      # Coolify sits behind Cloudflare Access, so send a CF Access service token too.
      - name: trigger coolify redeploy
        run: |
          code=$(curl --silent --show-error --output /dev/null --write-out "%{http_code}" \
            "${{ secrets.COOLIFY_URL }}/api/v1/deploy?uuid=${{ secrets.COOLIFY_APP_UUID }}&force=true" \
            --header "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            --header "CF-Access-Client-Id: ${{ secrets.CF_ACCESS_CLIENT_ID }}" \
            --header "CF-Access-Client-Secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}")
          echo "coolify deploy responded HTTP $code"
          # A CF Access bounce (302/403) or any non-2xx means the deploy never reached Coolify.
          [ "$code" = "200" ] || { echo "redeploy did not reach Coolify (check CF Access service token / secrets)"; exit 1; }
